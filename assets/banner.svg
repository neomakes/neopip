<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="50%" style="stop-color:#111111"/>
      <stop offset="100%" style="stop-color:#0a0a0a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2dd4bf"/>
      <stop offset="50%" style="stop-color:#14b8a6"/>
      <stop offset="100%" style="stop-color:#0d9488"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2dd4bf;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#2dd4bf;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04">
    <line x1="0" y1="75" x2="1200" y2="75" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="150" x2="1200" y2="150" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="225" x2="1200" y2="225" stroke="#fff" stroke-width="0.5"/>
    <line x1="300" y1="0" x2="300" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="900" y1="0" x2="900" y2="300" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Accent line top -->
  <rect x="0" y="0" width="1200" height="2" fill="url(#accent)"/>

  <!-- Glow orb -->
  <circle cx="200" cy="150" r="60" fill="url(#glow)" opacity="0.6"/>
  <circle cx="200" cy="150" r="35" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.8"/>
  <circle cx="200" cy="150" r="20" fill="#14b8a6" opacity="0.15"/>
  <circle cx="200" cy="150" r="8" fill="#2dd4bf" opacity="0.6"/>

  <!-- NeoPIP text -->
  <text x="320" y="135" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="700" fill="#f5f5f5" letter-spacing="-2">
    Neo<tspan fill="#2dd4bf">PIP</tspan>
  </text>

  <!-- Separator line -->
  <line x1="320" y1="155" x2="520" y2="155" stroke="url(#accent)" stroke-width="1" opacity="0.5"/>

  <!-- Subtitle -->
  <text x="320" y="185" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="18" fill="#a3a3a3" letter-spacing="3">
    Personal Intelligence Platform
  </text>

  <!-- NeoMakes branding -->
  <text x="320" y="220" font-family="system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#525252" letter-spacing="2">
    by NeoMakes
  </text>

  <!-- Accent line bottom -->
  <rect x="0" y="298" width="1200" height="2" fill="url(#accent)"/>
</svg>
